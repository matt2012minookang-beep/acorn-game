<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도토리 게임</title>

<style>

:root{
--bg:#0b0b10;
--panel: rgba(255,255,255,.06);
--border: rgba(255,255,255,.16);
--accent:#7a2cff;
--gold:#ffd84d;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:#fff;
font-family:Arial;
overflow:hidden;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
background:linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
}

.title{
font-weight:900;
font-size:20px;
}

.counter-chip{
display:flex;
gap:10px;
padding:10px 14px;
border-radius:14px;
background:var(--panel);
border:1px solid var(--border);
font-weight:900;
}

.counter-chip.golden{
color:var(--gold);
}

.shop-btn{
position:fixed;
top:80px;
left:14px;
padding:10px 14px;
border-radius:14px;
background:var(--panel);
border:1px solid var(--border);
cursor:pointer;
font-weight:900;
}

.shop-panel{
position:fixed;
top:80px;
left:14px;
width:340px;
background:#111;
border-radius:18px;
border:1px solid var(--border);
padding:14px;
display:none;
}

.shop-panel.show{
display:block;
}

.shop-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.close{
cursor:pointer;
padding:6px 10px;
border-radius:10px;
background:#222;
}

.item{
background:#161616;
border-radius:16px;
border:1px solid var(--border);
padding:12px;
margin-top:10px;
}

.buy{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:14px;
background:var(--accent);
color:#fff;
font-weight:900;
cursor:pointer;
}

.stage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.acorn-btn{
width:320px;
height:320px;
border-radius:30px;
border:1px solid var(--border);
background:#161616;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.acorn-btn.golden{
border-color:var(--gold);
box-shadow:0 0 20px rgba(255,216,77,.4);
}

.acorn{
font-size:120px;
}

.float-text{
position:fixed;
font-weight:900;
animation:float 0.7s forwards;
}

@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-40px)}
}

.squirrel-dock{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:var(--panel);
border:1px solid var(--border);
padding:8px 14px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="title">🌰 도토리 게임</div>
<div class="counter-chip" id="counterChip">
<span>🌰</span>
<span id="count">0</span>
</div>
</div>

<div class="shop-btn" id="shopBtn">🛒 상점</div>

<div class="shop-panel" id="shopPanel">

<div class="shop-header">
<div>🛒 상점</div>
<div class="close" id="shopClose">닫기</div>
</div>

<div class="item">
클릭 업그레이드<br>
가격 🌰 <span id="upgPrice"></span>
<button class="buy" id="buyUpgrade">구매</button>
</div>

<div class="item">
🐿 다람쥐<br>
보유 <span id="sqCount">0</span>마리<br>
수익 <span id="sqIncome">0</span>/s<br>
가격 🌰 <span id="sqPrice">10</span>
<button class="buy" id="buySquirrel">고용</button>
</div>

<div class="item">
🌲 청솔모<br>
보유 <span id="csCount">0</span>마리<br>
수익 <span id="csIncome">0</span>/s<br>
가격 🌰 <span id="csPrice">5000</span>
<button class="buy" id="buyChipmunk">고용</button>
</div>

</div>

<div class="stage">
<div class="acorn-btn" id="acornBtn">
<div class="acorn">🌰</div>
</div>
</div>

<div class="squirrel-dock">
🐿 <span id="dockSq">0</span> · 🌲 <span id="dockCs">0</span>
</div>

<script>

let acorn=0
let clickValue=1
let tier=0

let squirrelNext=[]
let chipmunkNext=[]

const upgrades=[
{v:2,c:20},
{v:4,c:100},
{v:8,c:250},
{v:16,c:750},
{v:32,c:1500},
{v:64,c:5000},
{v:128,c:15000},
{v:256,c:35000},
{v:512,c:100000},
{v:1000,c:200000}
]

const SQ_COST=[10,11,13,20,30,50,100,150]

function getSqCost(n){
if(n<=8)return SQ_COST[n-1]
return 150+(n-8)*50
}

function getCsCost(n){
return 5000+(n-1)*500
}

const countEl=document.getElementById("count")
const acornBtn=document.getElementById("acornBtn")
const counterChip=document.getElementById("counterChip")

const upgPrice=document.getElementById("upgPrice")

const sqCount=document.getElementById("sqCount")
const sqIncome=document.getElementById("sqIncome")
const sqPrice=document.getElementById("sqPrice")

const csCount=document.getElementById("csCount")
const csIncome=document.getElementById("csIncome")
const csPrice=document.getElementById("csPrice")

const dockSq=document.getElementById("dockSq")
const dockCs=document.getElementById("dockCs")

let golden=false
let goldenStart=0

function render(){

countEl.innerText=Math.floor(acorn)

if(golden){
acornBtn.classList.add("golden")
counterChip.classList.add("golden")
}else{
acornBtn.classList.remove("golden")
counterChip.classList.remove("golden")
}

const next=upgrades[tier]

if(next) upgPrice.innerText=next.c

const sq=squirrelNext.length
sqCount.innerText=sq
sqIncome.innerText=sq
sqPrice.innerText=getSqCost(sq+1)

const cs=chipmunkNext.length
csCount.innerText=cs
csIncome.innerText=cs*10
csPrice.innerText=getCsCost(cs+1)

dockSq.innerText=sq
dockCs.innerText=cs

}

function floatText(x,y,text){

let el=document.createElement("div")
el.className="float-text"
el.innerText=text
el.style.left=x+"px"
el.style.top=y+"px"

document.body.appendChild(el)

setTimeout(()=>el.remove(),700)

}

acornBtn.addEventListener("pointerdown",(e)=>{

let now=performance.now()

let gain=clickValue

if(golden && now-goldenStart>=100){
gain=clickValue*5
golden=false
}

acorn+=gain

floatText(e.clientX,e.clientY,"+"+gain)

if(!golden && Math.random()<0.03){
golden=true
goldenStart=now
}

render()

})

document.getElementById("buyUpgrade").onclick=()=>{

let next=upgrades[tier]
if(!next)return
if(acorn<next.c)return

acorn-=next.c
clickValue=next.v
tier++

render()

}

document.getElementById("buySquirrel").onclick=()=>{

let cost=getSqCost(squirrelNext.length+1)
if(acorn<cost)return

acorn-=cost
squirrelNext.push(performance.now()+1000)

render()

}

document.getElementById("buyChipmunk").onclick=()=>{

let cost=getCsCost(chipmunkNext.length+1)
if(acorn<cost)return

acorn-=cost
chipmunkNext.push(performance.now()+1000)

render()

}

setInterval(()=>{

let now=performance.now()

for(let i=0;i<squirrelNext.length;i++){
if(now>=squirrelNext[i]){
squirrelNext[i]+=1000
acorn+=1

let r=document.querySelector(".squirrel-dock").getBoundingClientRect()

floatText(r.left+r.width/2,r.top,"+1")
}
}

for(let i=0;i<chipmunkNext.length;i++){
if(now>=chipmunkNext[i]){
chipmunkNext[i]+=1000
acorn+=10

let r=document.querySelector(".squirrel-dock").getBoundingClientRect()

floatText(r.left+r.width/2,r.top,"+10")
}
}

render()

},50)

document.getElementById("shopBtn").onclick=()=>{
document.getElementById("shopPanel").classList.toggle("show")
}

document.getElementById("shopClose").onclick=()=>{
document.getElementById("shopPanel").classList.remove("show")
}

render()

</script>
</body>
</html>
