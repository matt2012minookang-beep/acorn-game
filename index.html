}

function getClickAchievementTarget(){
  if(clickAchievementStep === 1) return 200;

}
function getClickAchievementReward(){

function getSpentAchievementTarget(){
  const targets = [10000, 15000, 20000, 25000, 30000, 35000];
  if(spentAchievementStep <= targets.length) return targets[spentAchievementStep - 1];
  return 35000 + (spentAchievementStep - targets.length) * 5000;
}

  const rewards = [20, 23, 25, 30, 33, 35];
  if(spentAchievementStep <= rewards.length) return rewards[spentAchievementStep - 1];
  return 35 + (spentAchievementStep - rewards.length) * 2;
}

function buildSaveData(){
  const now = performance.now();
  const squirrelRemainingMs = squirrelNextPayouts.map(t => Math.max(0, Math.round(t - now)));
  const chipmunkRemainingMs = chipmunkNextPayouts.map(t => Math.max(0, Math.round(t - now)));
  return {
    acorn,
    clickValue,
    tier,
    achievementCount,
    acornAchievementStage,
    squirrelAchievementStep,
    chipmunkAchievementStep,
    clickAchievementStep,
    spentAchievementStep,
    totalClicks,
    totalSpentAcorn,
    squirrelRemainingMs,
    chipmunkRemainingMs,
    goldenReady,
    goldenRemainingMs: goldenReady ? Math.max(0, Math.round(GOLDEN_MIN_HOLD_MS - (now - goldenStartedAt))) : 0
  };
}

function saveCurrent(){
  if(!currentNick) return;
  profiles[currentNick] = buildSaveData();
  saveProfiles(profiles);
}

function applyLoadedProfile(p){
  const now = performance.now();
  acorn = Number(p.acorn ?? 0) || 0;
  tier = Number(p.tier ?? 0) || 0;
  clickValue = Number(p.clickValue ?? 1) || 1;
  achievementCount = Number(p.achievementCount ?? 0) || 0;

  acornAchievementStage = Number(p.acornAchievementStage ?? 1) || 1;
  squirrelAchievementStep = Number(p.squirrelAchievementStep ?? 1) || 1;
  chipmunkAchievementStep = Number(p.chipmunkAchievementStep ?? 1) || 1;
  clickAchievementStep = Number(p.clickAchievementStep ?? 1) || 1;
  spentAchievementStep = Number(p.spentAchievementStep ?? 1) || 1;

  totalClicks = Number(p.totalClicks ?? 0) || 0;
  totalSpentAcorn = Number(p.totalSpentAcorn ?? 0) || 0;

  goldenReady = !!p.goldenReady;
  normalizeByTier();

  const sqRemainings = Array.isArray(p.squirrelRemainingMs) ? p.squirrelRemainingMs : [];
  squirrelNextPayouts = sqRemainings.map(ms => now + Math.max(0, Number(ms) || 0));

  const csRemainings = Array.isArray(p.chipmunkRemainingMs) ? p.chipmunkRemainingMs : [];
  chipmunkNextPayouts = csRemainings.map(ms => now + Math.max(0, Number(ms) || 0));

  const goldenRemainingMs = Number(p.goldenRemainingMs ?? 0) || 0;
  goldenStartedAt = now - Math.max(0, GOLDEN_MIN_HOLD_MS - goldenRemainingMs);

  updateGoldenUI();
}

function canClaimAcornAchievement(){ return acorn >= getAcornAchievementTarget(); }
function canClaimSquirrelAchievement(){ return getSquirrelCount() >= getSquirrelAchievementTarget(); }
function canClaimChipmunkAchievement(){ return getChipmunkCount() >= getChipmunkAchievementTarget(); }
function canClaimClickAchievement(){ return totalClicks >= getClickAchievementTarget(); }
function canClaimSpentAchievement(){ return totalSpentAcorn >= getSpentAchievementTarget(); }

function canClaimAnyAchievement(){
  return (
    canClaimAcornAchievement() ||
    canClaimSquirrelAchievement() ||
    canClaimChipmunkAchievement() ||
    canClaimClickAchievement() ||
    canClaimSpentAchievement()
  );
}

/* =========================
   트로피 패널
========================= */
function getCurrentTrophyRank(){
  let current = null;
  for(const rank of TROPHY_RANKS){
    if(achievementCount >= rank.need) current = rank;
  }
  return current;
}
function getNextTrophyRank(){
  for(const rank of TROPHY_RANKS){
    if(achievementCount < rank.need) return rank;
  }
  return null;
}
function getTrophyProgressInfo(){
  const current = getCurrentTrophyRank();
  const next = getNextTrophyRank();

  if(!current && next){
    const currentValue = achievementCount;
    const maxValue = next.need;
    const pct = Math.max(0, Math.min(100, (currentValue / maxValue) * 100));
    return {
      currentRankText: "무등급",
      nextRankText: next.name + " " + next.stars,
      currentValue, maxValue, pct,
      remain: next.need - achievementCount
    };
  }

  if(current && next){
    const base = current.need;
    const max = next.need;
    const currentValue = achievementCount - base;
    const maxValue = max - base;
    const pct = Math.max(0, Math.min(100, (currentValue / maxValue) * 100));
    return {
      currentRankText: current.name + " " + current.stars,
      nextRankText: next.name + " " + next.stars,
      currentValue, maxValue, pct,
      remain: next.need - achievementCount
    };
  }

  return {
    currentRankText: current ? (current.name + " " + current.stars) : "무등급",
    nextRankText: "최고 등급",
    currentValue: 1,
    maxValue: 1,
    pct: 100,
    remain: 0
  };
}

function renderTrophyPanel(){
  const current = getCurrentTrophyRank();
  const next = getNextTrophyRank();
  const info = getTrophyProgressInfo();

  trophyRankName.textContent = current
    ? current.medal + " " + current.name + " " + current.stars
    : "무등급";

  trophySummaryText.innerHTML =
    "현재 트로피: <b>" + achievementCount.toLocaleString("ko-KR") + "</b>" +
    "<br>현재 등급: <b>" + (current ? (current.name + " " + current.stars) : "아직 없음") + "</b>";

  trophyNextText.textContent = next
    ? "다음 등급: " + next.name + " " + next.stars + " · 앞으로 " + (next.need - achievementCount).toLocaleString("ko-KR") + " 필요"
    : "최고 등급 달성 완료!";

  if(info.remain > 0){
    panelProgressLabel.textContent = info.currentRankText + " → " + info.nextRankText;
    panelProgressMeta.textContent = info.currentValue.toLocaleString("ko-KR") + " / " + info.maxValue.toLocaleString("ko-KR");
    panelProgressSub.textContent = Math.floor(info.pct).toLocaleString("ko-KR") + "%";
  }else{
    panelProgressLabel.textContent = "최고 등급";
    panelProgressMeta.textContent = "MAX";
    panelProgressSub.textContent = "100%";
  }
  panelTrophyBarFill.style.width = info.pct + "%";

  trophyRankList.innerHTML = TROPHY_RANKS.map(rank=>{
    const cleared = achievementCount >= rank.need;
    const isCurrent = current && current.need === rank.need;
    return `
      <div class="rank-row ${rank.kind} ${cleared ? "cleared" : ""} ${isCurrent ? "current" : ""}">
        <div class="rank-top">
          <div class="rank-name">
            <span>${rank.medal}</span>
            <span>${rank.name}</span>
            <span class="rank-stars">${rank.stars}</span>
          </div>
          <div class="rank-state">${isCurrent ? "현재 등급" : (cleared ? "달성 완료" : "미달성")}</div>
        </div>
        <div class="rank-need">필요 트로피: ${rank.need.toLocaleString("ko-KR")}</div>
      </div>
    `;
  }).join("");
}

  claimAchievementSquirrel.disabled = !squirrelReady;
  achievementHintSquirrel.textContent = squirrelReady
    ? "업적 달성! 받기를 눌러 트로피 +" + squirrelReward.toLocaleString("ko-KR") + "을 받자."
    : "다람쥐를 더 모아야 해.";

function spawnClickFloat(x, y, value, isGolden=false){

  else if(value >= 256) color = "#9dffb5";

}

/* =========================
   핵 감지
========================= */
function mean(arr){
  if(!arr.length) return 0;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
function stddev(arr){
  if(arr.length < 2) return 9999;
  const m = mean(arr);
  const v = arr.reduce((a,b)=>a+((b-m)*(b-m)),0)/arr.length;
  return Math.sqrt(v);
}
function dominantRoundedCount(arr){
  const counts = new Map();
  for(const n of arr){
    const r = Math.round(n);
    counts.set(r, (counts.get(r)||0)+1);
  }
  let max = 0;
  for(const v of counts.values()) if(v > max) max = v;
  return max;
}
function addSuspicion(points, reason){
  suspiciousScore += points;
  if(suspiciousScore >= 4){
    resetCurrentNickProgress();
    render();
    closeShop();
    closeNickMenu();
    closeAchieve();
    closeTrophy();
    showToast(reason);
    return false;
  }
  return true;
}
function decaySuspicion(now){
  if(!lastSuspiciousDecay) lastSuspiciousDecay = now;
  const elapsed = now - lastSuspiciousDecay;
  if(elapsed >= 1500 && suspiciousScore > 0){
    const dec = Math.floor(elapsed / 1500);
    suspiciousScore = Math.max(0, suspiciousScore - dec);
    lastSuspiciousDecay = now;
  }
}
function runAutoChecks(now){
  const clickCutoff = now - CLICK_HISTORY_WINDOW_MS;
  while(clickTimes.length && clickTimes[0] < clickCutoff) clickTimes.shift();

  while(clickIntervals.length > 40) clickIntervals.shift();

  const oneSecCount = clickTimes.filter(t => now - t <= HARD_CPS_WINDOW_MS).length;
  if(oneSecCount > HARD_CPS_LIMIT) return addSuspicion(4, "1초 동안 비정상적으로 많은 클릭이 감지되었어요.");

  if(clickIntervals.length >= 16){
    const last16 = clickIntervals.slice(-16);
    if(mean(last16) < 120 && stddev(last16) < 3.2){
      return addSuspicion(2, "너무 일정한 빠른 클릭 간격이 감지되었어요.");
    }
  }

  if(clickIntervals.length >= 20){
    const last20 = clickIntervals.slice(-20);
    if(mean(last20) < 130 && dominantRoundedCount(last20) >= 15){
      return addSuspicion(2, "반복적으로 동일한 간격의 클릭이 감지되었어요.");
    }
  }

  if(clickTimes.length >= 35 && clickIntervals.length >= 30){
    const recent = clickIntervals.slice(-30);
    const avg = mean(recent);
    const cps = 1000 / Math.max(avg, 1);
    if(cps > 11.5 && stddev(recent) < 5){
      return addSuspicion(2, "장시간 지나치게 안정된 연타 패턴이 감지되었어요.");
    }
  }

  if(clickIntervals.length >= 12){
    const tooFast = clickIntervals.slice(-12).filter(v => v < 45).length;
    if(tooFast >= 10){
      return addSuspicion(2, "비정상적으로 빠른 클릭이 반복되었어요.");
    }
  }

  return true;
}
function processHackCheck(now){
  decaySuspicion(now);
  const interval = lastClickTime ? (now - lastClickTime) : null;
  if(interval !== null && interval < CLICK_COOLDOWN_MS) return false;
  lastClickTime = now;
  clickTimes.push(now);
  if(interval !== null) clickIntervals.push(interval);
  return runAutoChecks(now);
}

function tryTriggerGolden(now){
  if(!goldenReady && Math.random() < GOLDEN_CHANCE) triggerGolden(now);
}
function canConsumeGolden(now){
  return goldenReady && (now - goldenStartedAt >= GOLDEN_MIN_HOLD_MS);
}
function addManualClickProgress(){
  totalClicks += 1;
}

function clickAcornFromPointer(e){
  if(!currentNick) return;
  const now = performance.now();
  if(!processHackCheck(now)) return;

  let gain = clickValue;
  let isGoldenClick = false;

  if(canConsumeGolden(now)){
    gain = clickValue * 5;
    goldenReady = false;
    goldenStartedAt = 0;
    isGoldenClick = true;
  }else{
    tryTriggerGolden(now);
  }

  addManualClickProgress();
  acorn += gain;
  render();
  saveCurrent();

  spawnClickFloat(e.clientX, e.clientY, gain, isGoldenClick);
}

/* =========================
   오프닝
========================= */
function createIrregularStops(totalMs = 3000){
  const stops = [];
  let elapsed = 0;
  let progress = 0;

  while(elapsed < totalMs){
    const remain = totalMs - elapsed;
    const dur = Math.min(remain, 120 + Math.random() * 300);

    let jump;
    if(progress < 12) jump = 5 + Math.random() * 9;
    else if(progress < 35) jump = 4 + Math.random() * 7;
    else if(progress < 65) jump = 3 + Math.random() * 5.5;
    else if(progress < 88) jump = 1.2 + Math.random() * 3;
    else jump = 0.5 + Math.random() * 1.6;

    progress = Math.min(99, progress + jump);
    elapsed += dur;
    stops.push({ time: elapsed, progress });
  }

  stops.push({ time: totalMs, progress: 100 });
  return stops;
}

function runOpening(){
  const totalMs = 3000;
  const stops = createIrregularStops(totalMs);

  const start = performance.now();
  let visualProgress = 0;
  let stopIndex = 0;
  let targetProgress = 0;

  function tick(now){
    const elapsed = now - start;

    while(stopIndex < stops.length && elapsed >= stops[stopIndex].time){
      targetProgress = stops[stopIndex].progress;
      stopIndex++;
    }

    const diff = targetProgress - visualProgress;
    const smoothing = diff > 10 ? 0.18 : 0.11;
    visualProgress += diff * smoothing;

    if(Math.abs(diff) < 0.08 && targetProgress > visualProgress){
      visualProgress = targetProgress;
    }

    introProgressFill.style.width = Math.min(100, visualProgress) + "%";

    if(elapsed < totalMs || visualProgress < 99.95){
      requestAnimationFrame(tick);
      return;
    }

    introProgressFill.style.width = "100%";

    setTimeout(()=>{
      introScreen.classList.add("hidden");
      setTimeout(()=> showNicknameOverlay(), 550);
    }, 100);
  }

  requestAnimationFrame(tick);
}

/* =========================
   시작
========================= */
setLocked(true);
render();
runOpening();
