<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>도토리 게임</title>
  <style>
    :root{
      --bg:#0b0b10;
      --panel: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.16);
      --text:#ffffff;
      --accent:#7a2cff;
      --danger:#ff5a7a;
      --good:#2ecc71;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family: "Malgun Gothic", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(900px 500px at 50% 0%, rgba(122,44,255,.18), transparent 60%),
                  var(--bg);
      color: var(--text);
      overflow:hidden;
      user-select:none;
    }

    /* 상단바 */
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      background: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0));
      z-index:10;
      pointer-events:none;
    }
    .title{
      pointer-events:auto;
      font-weight:800;
      letter-spacing:-0.5px;
      font-size:22px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title .badge{ font-size:18px; opacity:.9; }

    .counter-chip{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:14px;
      background: var(--panel);
      border:1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      font-weight:800;
    }
    .counter-chip .emoji{
      font-size:22px;
      line-height:1;
      filter: drop-shadow(0 2px 0 rgba(0,0,0,.35));
    }
    .counter-chip .count{
      font-size:18px;
      min-width:72px;
      text-align:right;
      letter-spacing:0.2px;
    }

    /* 왼쪽 상점 버튼 */
    .shop-btn{
      position:fixed;
      top:84px;
      left:14px;
      z-index:20;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      cursor:pointer;
      font-weight:800;
    }
    .shop-btn:active{ transform: scale(0.98); }

    /* 상점 패널 */
    .shop-panel{
      position:fixed;
      top:84px;
      left:14px;
      width:min(360px, 90vw);
      z-index:30;
      background: rgba(15,15,22,.78);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      padding:14px;
      display:none;
    }
    .shop-panel.show{ display:block; }

    .shop-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .shop-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      font-size:16px;
    }
    .close{
      cursor:pointer;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:#fff;
      font-weight:800;
    }

    .item{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:12px;
      margin-bottom:10px;
    }
    .item:last-child{ margin-bottom:0; }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }
    .item-name{ font-weight:900; }
    .item-desc{ opacity:.8; font-size:13px; line-height:1.4; margin-top:4px; }
    .price{
      display:flex;
      align-items:center;
      gap:6px;
      font-weight:900;
      white-space:nowrap;
    }
    .buy{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      font-weight:900;
      background: var(--accent);
      color:#fff;
    }
    .buy:disabled{
      cursor:not-allowed;
      opacity:.45;
      background: rgba(122,44,255,.35);
    }
    .owned{
      margin-top:10px;
      font-size:12px;
      opacity:.8;
    }

    /* 중앙 클릭 영역 */
    .stage{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding-top:72px;
    }
    .acorn-btn{
      width:min(360px, 72vw);
      height:min(360px, 72vw);
      border-radius:28px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 22px 70px rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .06s ease, background .15s ease;
      outline:none;
      position:relative;
    }
    .acorn-btn:active{
      transform: scale(0.97);
      background: rgba(255,255,255,.06);
    }
    .acorn{
      font-size:min(160px, 30vw);
      line-height:1;
      filter: drop-shadow(0 10px 0 rgba(0,0,0,.35));
    }

    /* +n 떠오르는 텍스트 */
    .float-text{
      position:fixed;
      z-index:50;
      font-weight:1000;
      font-size:18px;
      pointer-events:none;
      text-shadow: 0 6px 18px rgba(0,0,0,.45);
      animation: floatUp 700ms ease-out forwards;
      will-change: transform, opacity;
    }
    @keyframes floatUp{
      0%   { transform: translate(-50%, -50%) translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateY(-34px) scale(1.05); opacity: 0; }
    }

    /* 하단 힌트 */
    .hint{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      opacity:.72;
      font-size:14px;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      z-index:5;
    }

    /* 닉네임 시작 모달 */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(10px);
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .modal{
      width:min(520px, 96vw);
      border-radius:22px;
      background: rgba(15,15,22,.86);
      border:1px solid rgba(255,255,255,.16);
      box-shadow: 0 28px 110px rgba(0,0,0,.6);
      padding:18px;
    }
    .modal h2{
      margin:0 0 6px;
      font-size:20px;
      letter-spacing:-.3px;
    }
    .modal .sub{
      margin:0 0 14px;
      opacity:.75;
      font-size:13px;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    .section{
      padding:12px;
      border-radius:18px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
    }
    .section-title{
      font-weight:900;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    input[type="text"]{
      flex:1;
      min-width: 200px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.25);
      color:#fff;
      outline:none;
    }
    .btn{
      padding:11px 12px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      font-weight:900;
      background: var(--accent);
      color:#fff;
      min-width: 110px;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      background: rgba(122,44,255,.35);
    }
    .msg{
      margin-top:8px;
      font-size:12px;
      opacity:.85;
    }
    .msg.good{ color: rgba(46, 204, 113, .95); }
    .msg.bad{ color: rgba(255, 90, 122, .95); }
    .tiny{
      margin-top:10px;
      opacity:.6;
      font-size:12px;
      line-height:1.45;
    }

    /* 게임 잠금 */
    .locked{ pointer-events:none; opacity:.75; }

    /* 닉네임 칩 + 메뉴 */
    .nick-wrap{
      position:fixed;
      top:84px;
      right:14px;
      z-index:40;
      display:none;
    }
    .nick-chip{
      padding:9px 12px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .nick-chip:active{ transform: scale(0.98); }

    .nick-menu{
      position:absolute;
      top:44px;
      right:0;
      width:220px;
      border-radius:16px;
      background: rgba(15,15,22,.86);
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      padding:8px;
      display:none;
    }
    .nick-menu.show{ display:block; }

    .menu-btn{
      width:100%;
      text-align:left;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color:#fff;
      cursor:pointer;
      font-weight:900;
      margin-bottom:8px;
    }
    .menu-btn:last-child{ margin-bottom:0; }
    .menu-btn.danger{
      border-color: rgba(255,90,122,.25);
      background: rgba(255,90,122,.10);
    }
    .menu-btn:active{ transform: scale(0.99); }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="title">
      <span class="badge">🌰</span>
      <span>도토리 게임</span>
    </div>

    <div class="counter-chip" aria-label="도토리 수">
      <span class="emoji">🌰</span>
      <span id="count" class="count">0</span>
    </div>
  </div>

  <!-- 닉네임 영역(클릭 메뉴) -->
  <div class="nick-wrap" id="nickWrap">
    <div class="nick-chip" id="nickChip">👤 <span id="nickText"></span></div>
    <div class="nick-menu" id="nickMenu">
      <button class="menu-btn" id="btnLogout">로그아웃</button>
      <button class="menu-btn danger" id="btnResetNick">닉네임 초기화</button>
    </div>
  </div>

  <!-- 상점 버튼 -->
  <div class="shop-btn locked" id="shopBtn" aria-label="상점 열기">
    🛒 상점
  </div>

  <!-- 상점 패널 -->
  <div class="shop-panel" id="shopPanel" aria-label="상점">
    <div class="shop-header">
      <div class="shop-title">🛒 상점</div>
      <button class="close" id="shopClose">닫기</button>
    </div>

    <!-- 업그레이드(한 칸만 보이게) -->
    <div class="item" id="upgradeItem">
      <div class="item-top">
        <div>
          <div class="item-name" id="upgName">클릭 수익 업그레이드</div>
          <div class="item-desc" id="upgDesc">설명</div>
        </div>
        <div class="price"><span>🌰</span><span id="upgPrice">0</span></div>
      </div>
      <button class="buy" id="buyUpgrade">구매</button>
      <div class="owned" id="upgHint"></div>
    </div>
  </div>

  <div class="stage">
    <button class="acorn-btn locked" id="acornBtn" aria-label="도토리 클릭">
      <div class="acorn">🌰</div>
    </button>
  </div>

  <div class="hint">도토리를 눌러서 모아봐 🌰</div>

  <!-- 닉네임 오버레이 -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>닉네임을 입력하세요!</h2>
      <p class="sub">닉네임마다 진행 상황이 저장됩니다. (이 브라우저/기기 안에서만 저장)</p>

      <div class="grid">

        <div class="section">
          <div class="section-title">🆕 새로 시작하기</div>
          <div class="row">
            <input id="newNick" type="text" placeholder="새 닉네임" maxlength="20" />
            <button class="btn" id="newStart" disabled>시작</button>
          </div>
          <div class="msg" id="newMsg"></div>
          <div class="tiny">입력하면 아래에 <b>사용 가능한 닉네임</b> / <b>이미 사용중인 닉네임</b>이 표시됩니다.</div>
        </div>

        <div class="section">
          <div class="section-title">🔁 이미 사용중이신 닉네임이 있나요?</div>
          <div class="row">
            <input id="oldNick" type="text" placeholder="기존 닉네임" maxlength="20" />
            <button class="btn" id="oldEnter" disabled>들어가기</button>
          </div>
          <div class="msg" id="oldMsg"></div>
          <div class="tiny">기존 닉네임이 맞으면 저장된 상태로 들어갑니다.</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // =====================
    // 저장
    // =====================
    const LS_KEY = "dotori_game_profiles_v2";

    function loadProfiles(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return {};
        const obj = JSON.parse(raw);
        if(obj && typeof obj === "object") return obj;
        return {};
      }catch(e){ return {}; }
    }
    function saveProfiles(profiles){
      localStorage.setItem(LS_KEY, JSON.stringify(profiles));
    }
    function sanitizeNick(n){
      return (n ?? "").trim().replace(/\s+/g, " ");
    }
    function isValidNick(n){
      const s = sanitizeNick(n);
      return s.length >= 1 && s.length <= 20;
    }

    // =====================
    // 게임 상태
    // =====================
    let profiles = loadProfiles();
    let currentNick = null;

    let acorn = 0;
    let clickValue = 1;
    // tier: 0(+1), 1(+2), 2(+4), 3(+8)
    let tier = 0;

    const UPGRADE_STEPS = [
      { toTier: 1, toValue: 2, cost: 20,  name: "클릭 수익 +1", desc: "구매 후: 클릭당 <b>+2</b>" },
      { toTier: 2, toValue: 4, cost: 100, name: "클릭 수익 +2", desc: "구매 후: 클릭당 <b>+4</b>" },
      { toTier: 3, toValue: 8, cost: 250, name: "클릭 수익 +4", desc: "구매 후: 클릭당 <b>+8</b>" }
    ];

    // DOM
    const countEl = document.getElementById("count");
    const btn = document.getElementById("acornBtn");

    const shopBtn = document.getElementById("shopBtn");
    const shopPanel = document.getElementById("shopPanel");
    const shopClose = document.getElementById("shopClose");

    const upgName = document.getElementById("upgName");
    const upgDesc = document.getElementById("upgDesc");
    const upgPrice = document.getElementById("upgPrice");
    const buyUpgrade = document.getElementById("buyUpgrade");
    const upgHint = document.getElementById("upgHint");
    const upgradeItem = document.getElementById("upgradeItem");

    const overlay = document.getElementById("overlay");
    const newNick = document.getElementById("newNick");
    const newStart = document.getElementById("newStart");
    const newMsg = document.getElementById("newMsg");

    const oldNick = document.getElementById("oldNick");
    const oldEnter = document.getElementById("oldEnter");
    const oldMsg = document.getElementById("oldMsg");

    const nickWrap = document.getElementById("nickWrap");
    const nickChip = document.getElementById("nickChip");
    const nickText = document.getElementById("nickText");
    const nickMenu = document.getElementById("nickMenu");
    const btnLogout = document.getElementById("btnLogout");
    const btnResetNick = document.getElementById("btnResetNick");

    function setLocked(isLocked){
      const lockedEls = document.querySelectorAll(".locked");
      lockedEls.forEach(el=>{
        el.style.pointerEvents = isLocked ? "none" : "auto";
        el.style.opacity = isLocked ? "0.75" : "1";
      });
    }

    function saveCurrent(){
      if(!currentNick) return;
      profiles[currentNick] = { acorn, clickValue, tier };
      saveProfiles(profiles);
    }

    function normalizeByTier(){
      // tier 기준으로 clickValue 보정
      if(tier <= 0){ tier = 0; clickValue = 1; }
      else if(tier === 1){ clickValue = 2; }
      else if(tier === 2){ clickValue = 4; }
      else { tier = 3; clickValue = 8; }
    }

    function loadProfile(nick){
      const p = profiles[nick];
      if(!p) return false;

      currentNick = nick;
      acorn = Number(p.acorn ?? 0) || 0;
      tier = Number(p.tier ?? 0) || 0;
      clickValue = Number(p.clickValue ?? 1) || 1;

      // 저장 값이 꼬였어도 tier 우선
      normalizeByTier();
      return true;
    }

    function createProfile(nick){
      currentNick = nick;
      acorn = 0;
      tier = 0;
      clickValue = 1;
      saveCurrent();
    }

    function resetCurrentNickProgress(){
      if(!currentNick) return;
      acorn = 0;
      tier = 0;
      clickValue = 1;
      saveCurrent();
    }

    function logout(){
      // 저장 후 나가기
      saveCurrent();
      currentNick = null;
      closeShop();
      closeNickMenu();

      // 잠금 + 오버레이 다시
      setLocked(true);
      nickWrap.style.display = "none";
      overlay.style.display = "flex";

      // 입력칸 초기화/메시지 초기화/버튼 비활성
      newNick.value = "";
      oldNick.value = "";
      setMsg(newMsg, "", null);
      setMsg(oldMsg, "", null);
      newStart.disabled = true;
      oldEnter.disabled = true;

      // 화면 카운트도 0처럼 보이게
      countEl.textContent = "0";
    }

    function getNextUpgrade(){
      // tier에 따라 다음 업그레이드 하나만 노출
      // tier 0 -> steps[0], tier1 -> steps[1], tier2 -> steps[2], tier3 -> none
      if(tier === 0) return UPGRADE_STEPS[0];
      if(tier === 1) return UPGRADE_STEPS[1];
      if(tier === 2) return UPGRADE_STEPS[2];
      return null;
    }

    function render(){
      countEl.textContent = acorn.toLocaleString("ko-KR");

      if(currentNick){
        nickWrap.style.display = "block";
        nickText.textContent = currentNick;
      }

      const next = getNextUpgrade();
      if(!next){
        // 더 이상 업그레이드 없음
        upgName.textContent = "업그레이드 완료";
        upgDesc.innerHTML = "현재 클릭당 <b>+" + clickValue + "</b>";
        upgPrice.textContent = "-";
        buyUpgrade.disabled = true;
        buyUpgrade.textContent = "완료";
        upgHint.textContent = "더 이상 업그레이드가 없습니다.";
        return;
      }

      upgName.textContent = next.name;
      upgDesc.innerHTML = next.desc;
      upgPrice.textContent = next.cost.toLocaleString("ko-KR");

      const canBuy = acorn >= next.cost;
      buyUpgrade.disabled = !canBuy;
      buyUpgrade.textContent = "구매";
      upgHint.textContent = "현재 클릭당 +" + clickValue + " → 업그레이드 후 +" + next.toValue;
    }

    // =====================
    // +n 뜨는 효과
    // =====================
    function spawnFloatText(x, y, n){
      const el = document.createElement("div");
      el.className = "float-text";
      el.textContent = "+" + n;
      el.style.left = x + "px";
      el.style.top  = y + "px";
      if(n >= 8) el.style.color = "#ffd36e";
      else if(n >= 4) el.style.color = "#9dffb5";
      else if(n >= 2) el.style.color = "#9d7bff";
      else el.style.color = "#ffffff";
      document.body.appendChild(el);
      el.addEventListener("animationend", ()=> el.remove());
    }

    function clickAcorn(e){
      if(!currentNick) return;

      acorn += clickValue;
      render();
      saveCurrent();

      let x, y;
      if (e && e.touches && e.touches[0]){
        x = e.touches[0].clientX;
        y = e.touches[0].clientY;
      } else if (e){
        x = e.clientX;
        y = e.clientY;
      } else {
        const r = btn.getBoundingClientRect();
        x = r.left + r.width/2;
        y = r.top + r.height/2;
      }
      spawnFloatText(x, y, clickValue);
    }

    btn.addEventListener("click", clickAcorn);
    btn.addEventListener("touchstart", (e)=>{ clickAcorn(e); }, {passive:true});
    btn.addEventListener("keydown", (e)=>{
      if(e.key === " " || e.key === "Enter"){
        e.preventDefault();
        clickAcorn(null);
      }
    });

    // =====================
    // 상점 열기/닫기
    // =====================
    function openShop(){ shopPanel.classList.add("show"); }
    function closeShop(){ shopPanel.classList.remove("show"); }

    shopBtn.addEventListener("click", ()=>{
      if(!currentNick) return;
      if (shopPanel.classList.contains("show")) closeShop();
      else openShop();
    });
    shopClose.addEventListener("click", closeShop);

    buyUpgrade.addEventListener("click", ()=>{
      if(!currentNick) return;
      const next = getNextUpgrade();
      if(!next) return;
      if(acorn < next.cost) return;

      acorn -= next.cost;
      tier = next.toTier;
      clickValue = next.toValue;
      normalizeByTier();

      render();
      saveCurrent();
    });

    // =====================
    // 닉네임 메뉴 (로그아웃/초기화)
    // =====================
    function openNickMenu(){ nickMenu.classList.add("show"); }
    function closeNickMenu(){ nickMenu.classList.remove("show"); }
    function toggleNickMenu(){
      if(nickMenu.classList.contains("show")) closeNickMenu();
      else openNickMenu();
    }

    nickChip.addEventListener("click", (e)=>{
      e.stopPropagation();
      toggleNickMenu();
    });

    document.addEventListener("click", ()=>{
      // 바깥 클릭하면 메뉴 닫기
      closeNickMenu();
    });

    btnLogout.addEventListener("click", (e)=>{
      e.stopPropagation();
      logout();
    });

    btnResetNick.addEventListener("click", (e)=>{
      e.stopPropagation();
      // 진행도 초기화
      resetCurrentNickProgress();
      render();
      saveCurrent();
      closeNickMenu();
      closeShop();
    });

    // =====================
    // 닉네임 UI 로직
    // =====================
    function setMsg(el, text, kind){
      el.textContent = text || "";
      el.classList.remove("good","bad");
      if(kind) el.classList.add(kind);
    }

    function updateNewNickUI(){
      const nick = sanitizeNick(newNick.value);
      if(!isValidNick(nick)){
        newStart.disabled = true;
        setMsg(newMsg, "", null);
        return;
      }
      if(profiles[nick]){
        newStart.disabled = true;
        setMsg(newMsg, "이미 사용중인 닉네임", "bad");
      } else {
        newStart.disabled = false;
        setMsg(newMsg, "사용 가능한 닉네임", "good");
      }
    }

    function updateOldNickUI(){
      const nick = sanitizeNick(oldNick.value);
      if(!isValidNick(nick)){
        oldEnter.disabled = true;
        setMsg(oldMsg, "", null);
        return;
      }
      if(profiles[nick]){
        oldEnter.disabled = false;
        setMsg(oldMsg, "이미 사용중인 닉네임", "good");
      } else {
        oldEnter.disabled = true;
        setMsg(oldMsg, "이미 사용중인 닉네임이 아닙니다", "bad");
      }
    }

    newNick.addEventListener("input", updateNewNickUI);
    oldNick.addEventListener("input", updateOldNickUI);

    newStart.addEventListener("click", ()=>{
      const nick = sanitizeNick(newNick.value);
      if(!isValidNick(nick)) return;

      if(profiles[nick]){
        setMsg(newMsg, "이미 사용중인 닉네임", "bad");
        newStart.disabled = true;
        return;
      }

      createProfile(nick);
      overlay.style.display = "none";
      setLocked(false);
      nickWrap.style.display = "block";
      render();
    });

    oldEnter.addEventListener("click", ()=>{
      const nick = sanitizeNick(oldNick.value);
      if(!isValidNick(nick)) return;

      if(!profiles[nick]){
        setMsg(oldMsg, "이미 사용중인 닉네임이 아닙니다", "bad");
        oldEnter.disabled = true;
        return;
      }

      loadProfile(nick);
      overlay.style.display = "none";
      setLocked(false);
      nickWrap.style.display = "block";
      render();
    });

    newNick.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !newStart.disabled) newStart.click();
    });
    oldNick.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !oldEnter.disabled) oldEnter.click();
    });

    // 시작: 잠금 + 오버레이
    setLocked(true);
    render();
  </script>

</body>
</html>
