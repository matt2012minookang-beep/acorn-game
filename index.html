<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도토리 게임</title>

<style>
:root{
--bg:#0b0b10;
--panel:rgba(255,255,255,.06);
--border:rgba(255,255,255,.16);
--accent:#7a2cff;
--gold:#ffd84d;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui;
background:radial-gradient(900px 500px at 50% 0%, rgba(122,44,255,.18), transparent 60%),var(--bg);
color:#fff;
overflow:hidden;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:10;
}

.title{
font-size:22px;
font-weight:800;
display:flex;
gap:10px;
}

.counter-chip{
display:flex;
gap:10px;
align-items:center;
background:var(--panel);
border:1px solid var(--border);
padding:10px 14px;
border-radius:14px;
font-weight:900;
}

.counter-chip.golden{
box-shadow:0 0 20px rgba(255,216,77,.5);
}

.shop-btn{
position:fixed;
top:84px;
left:14px;
background:var(--panel);
border:1px solid var(--border);
padding:10px 14px;
border-radius:14px;
cursor:pointer;
z-index:20;
}

.shop-panel{
position:fixed;
top:84px;
left:14px;
width:360px;
max-width:90vw;
background:rgba(15,15,22,.9);
border:1px solid var(--border);
border-radius:18px;
padding:14px;
display:none;
z-index:30;
}

.shop-panel.show{display:block}

.shop-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.close{
padding:6px 10px;
background:var(--panel);
border:1px solid var(--border);
border-radius:10px;
cursor:pointer;
}

.item{
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
padding:12px;
margin-bottom:10px;
}

.buy{
width:100%;
margin-top:10px;
background:var(--accent);
border:none;
color:#fff;
padding:10px;
border-radius:12px;
font-weight:900;
cursor:pointer;
}

.stage{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.acorn-btn{
width:300px;
height:300px;
border-radius:30px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.acorn{
font-size:140px;
}

.acorn-btn.golden{
box-shadow:0 0 25px rgba(255,216,77,.7);
}

.float-text{
position:fixed;
font-weight:900;
animation:floatUp .7s forwards;
}

@keyframes floatUp{
0%{opacity:0;transform:translateY(0)}
10%{opacity:1}
100%{opacity:0;transform:translateY(-40px)}
}

.squirrel-dock{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
background:var(--panel);
border:1px solid var(--border);
padding:10px 14px;
border-radius:999px;
font-weight:900;
display:flex;
gap:10px;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:100;
}

.modal{
background:#151520;
border:1px solid var(--border);
border-radius:20px;
padding:20px;
width:420px;
max-width:95vw;
}

input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid var(--border);
background:#000;
color:#fff;
margin-top:8px;
}

.btn{
margin-top:10px;
width:100%;
padding:10px;
background:var(--accent);
border:none;
border-radius:12px;
color:#fff;
font-weight:900;
cursor:pointer;
}

.msg{font-size:12px;margin-top:6px}

.nick-wrap{
position:fixed;
top:84px;
right:14px;

/* 핵심 수정 */
z-index:20;
}

.nick-chip{
background:var(--panel);
border:1px solid var(--border);
padding:10px 14px;
border-radius:14px;
cursor:pointer;
font-weight:900;
}

.nick-menu{
position:absolute;
top:44px;
right:0;
background:#151520;
border:1px solid var(--border);
border-radius:14px;
padding:6px;
display:none;
width:180px;
}

.nick-menu.show{display:block}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:6px;
border:none;
border-radius:10px;
background:var(--panel);
color:#fff;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
<div class="title">🌰 도토리 게임</div>
<div class="counter-chip" id="counterChip">
<span>🌰</span>
<span id="count">0</span>
</div>
</div>

<div class="shop-btn" id="shopBtn">🛒 상점</div>

<div class="shop-panel" id="shopPanel">

<div class="shop-header">
<div>상점</div>
<button class="close" id="shopClose">닫기</button>
</div>

<div class="item">
<div>🐿 다람쥐 (1/s)</div>
<div>보유: <span id="sqCount">0</span></div>
<div>가격: <span id="sqPrice">10</span></div>
<button class="buy" id="buySquirrel">구매</button>
</div>

<div class="item">
<div>🌲 청솔모 (10/s)</div>
<div>보유: <span id="csCount">0</span></div>
<div>가격: <span id="csPrice">5000</span></div>
<button class="buy" id="buyChipmunk">구매</button>
</div>

</div>

<div class="stage">
<div class="acorn-btn" id="acornBtn">
<div class="acorn">🌰</div>
</div>
</div>

<div class="squirrel-dock">
🐿 <span id="dockSq">0</span>  
🌲 <span id="dockCs">0</span>  
<span id="dockIncome">0</span>/s
</div>

<div class="nick-wrap" id="nickWrap">
<div class="nick-chip" id="nickChip">
👤 <span id="nickText"></span>
</div>

<div class="nick-menu" id="nickMenu">
<button class="menu-btn" id="btnLogout">로그아웃</button>
<button class="menu-btn" id="btnResetNick">닉네임 초기화</button>
</div>
</div>

<script>

let acorn=0
let squirrels=0
let chipmunks=0

const countEl=document.getElementById("count")
const acornBtn=document.getElementById("acornBtn")

const sqCount=document.getElementById("sqCount")
const csCount=document.getElementById("csCount")

const dockSq=document.getElementById("dockSq")
const dockCs=document.getElementById("dockCs")
const dockIncome=document.getElementById("dockIncome")

const shopBtn=document.getElementById("shopBtn")
const shopPanel=document.getElementById("shopPanel")
const shopClose=document.getElementById("shopClose")

const buySquirrel=document.getElementById("buySquirrel")
const buyChipmunk=document.getElementById("buyChipmunk")

const sqPrice=document.getElementById("sqPrice")
const csPrice=document.getElementById("csPrice")

let sqCost=10
let csCost=5000

function render(){
countEl.textContent=Math.floor(acorn)
sqCount.textContent=squirrels
csCount.textContent=chipmunks

dockSq.textContent=squirrels
dockCs.textContent=chipmunks

dockIncome.textContent=squirrels+chipmunks*10

sqPrice.textContent=sqCost
csPrice.textContent=csCost
}

acornBtn.onclick=e=>{
acorn++
spawn("+1",e.clientX,e.clientY)
render()
}

function spawn(t,x,y){
const el=document.createElement("div")
el.className="float-text"
el.textContent=t
el.style.left=x+"px"
el.style.top=y+"px"
document.body.appendChild(el)
setTimeout(()=>el.remove(),700)
}

buySquirrel.onclick=()=>{
if(acorn<sqCost)return
acorn-=sqCost
squirrels++
sqCost+=Math.floor(sqCost*0.1)
render()
}

buyChipmunk.onclick=()=>{
if(acorn<csCost)return
acorn-=csCost
chipmunks++
csCost+=500
render()
}

setInterval(()=>{
acorn+=squirrels
acorn+=chipmunks*10
render()
},1000)

shopBtn.onclick=()=>{
shopPanel.classList.toggle("show")
}

shopClose.onclick=()=>{
shopPanel.classList.remove("show")
}

render()

</script>

</body>
</html>
