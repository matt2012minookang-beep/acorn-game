<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도토리 게임</title>

<style>
body{
margin:0;
background:#0b0b10;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#top{
position:fixed;
top:10px;
left:10px;
font-size:22px;
font-weight:bold;
}

#count{
position:fixed;
top:10px;
right:20px;
font-size:22px;
}

#acornBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
user-select:none;
}

.float{
position:absolute;
font-weight:bold;
animation:float 0.7s forwards;
pointer-events:none;
}

@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-40px)}
}

#shopBtn{
position:fixed;
left:10px;
top:60px;
cursor:pointer;
}

#shop{
position:fixed;
left:10px;
top:100px;
background:#222;
padding:10px;
display:none;
}

#squirrelDock{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}

</style>
</head>

<body>

<div id="top">🌰 도토리 게임</div>
<div id="count">0</div>

<div id="shopBtn">🛒 상점</div>

<div id="shop">

<div>
클릭 업그레이드<br>
<button id="upgradeBtn">구매</button>
<span id="upgradePrice"></span>
</div>

<br>

<div>
🐿 다람쥐 고용<br>
<button id="squirrelBtn">고용</button>
<span id="squirrelPrice"></span>
</div>

</div>

<div id="acornBtn">🌰</div>

<div id="squirrelDock">🐿 x <span id="sqCount">0</span></div>

<script>

let acorn=0
let clickValue=1
let tier=0
let squirrels=0

const countEl=document.getElementById("count")
const acornBtn=document.getElementById("acornBtn")

const shopBtn=document.getElementById("shopBtn")
const shop=document.getElementById("shop")

const upgradeBtn=document.getElementById("upgradeBtn")
const upgradePriceEl=document.getElementById("upgradePrice")

const squirrelBtn=document.getElementById("squirrelBtn")
const squirrelPriceEl=document.getElementById("squirrelPrice")

const sqCount=document.getElementById("sqCount")

const upgrades=[
{v:2,c:20},
{v:4,c:100},
{v:8,c:250},
{v:16,c:750},
{v:32,c:1500},
{v:64,c:5000}
]

const squirrelCosts=[10,11,13,20,30,50,100,150]

function nextSquirrelCost(){
let n=squirrels+1
if(n<=8)return squirrelCosts[n-1]
return 150+(n-8)*50
}

function updateUI(){
countEl.innerText=acorn.toFixed(1)

sqCount.innerText=squirrels

if(tier<upgrades.length){
upgradePriceEl.innerText=" "+upgrades[tier].c
}else{
upgradeBtn.disabled=true
upgradePriceEl.innerText=" 완료"
}

squirrelPriceEl.innerText=" "+nextSquirrelCost()
}

function floatText(x,y,text){
let el=document.createElement("div")
el.className="float"
el.innerText=text
el.style.left=x+"px"
el.style.top=y+"px"
document.body.appendChild(el)
setTimeout(()=>el.remove(),700)
}

let lastClick=0
let clicks=[]

function clickAcorn(e){

let now=performance.now()

if(now-lastClick<10)return
lastClick=now

clicks.push(now)
clicks=clicks.filter(t=>now-t<1000)

if(clicks.length>20){
alert("핵 감지 계정 초기화")
acorn=0
tier=0
clickValue=1
squirrels=0
updateUI()
return
}

acorn+=clickValue
updateUI()

floatText(e.clientX,e.clientY,"+"+clickValue)

}

acornBtn.addEventListener("pointerdown",clickAcorn)

shopBtn.onclick=()=>{
shop.style.display=shop.style.display==="none"?"block":"none"
}

upgradeBtn.onclick=()=>{

let up=upgrades[tier]

if(!up)return

if(acorn<up.c)return

acorn-=up.c
clickValue=up.v
tier++

updateUI()

}

squirrelBtn.onclick=()=>{

let cost=nextSquirrelCost()

if(acorn<cost)return

acorn-=cost
squirrels++

updateUI()

let r=document.getElementById("squirrelDock").getBoundingClientRect()

floatText(r.left+r.width/2,r.top,"+0.5")

}

setInterval(()=>{

if(squirrels>0){

acorn+=squirrels*0.5
updateUI()

}

},1000)

updateUI()

</script>

</body>
</html>
